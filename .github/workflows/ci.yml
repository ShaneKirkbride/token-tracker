name: ci

on:
  push:
    branches: [ main, work ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore AiUsageDashboard.sln
      - name: Build
        run: dotnet build AiUsageDashboard.sln -c Release --no-restore
      - name: Test with coverage gate
        run: dotnet test AiUsageDashboard.sln -c Release --no-build --no-restore /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=94 /p:ThresholdType=line /p:ThresholdStat=total
      - name: Publish web artifact
        run: dotnet publish src/AiUsageDashboard.Web/AiUsageDashboard.Web.csproj -c Release --no-build -o artifacts/web
      - uses: actions/upload-artifact@v4
        with:
          name: ai-usage-dashboard-web
          path: artifacts/web
